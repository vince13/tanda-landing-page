<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Venture Studio: magenta to cyan - infrastructure stack -->
    <linearGradient id="studioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0050"/>
      <stop offset="100%" style="stop-color:#00f2ea"/>
    </linearGradient>
  </defs>
  <!-- Three stacked layers: Execution | Human Capital | Commerce -->
  <!-- Top bar: ForgeSpace -->
  <rect x="18" y="30" width="84" height="16" rx="4" fill="url(#studioGrad)"/>
  <!-- Middle bar: OpenCareer -->
  <rect x="26" y="52" width="68" height="16" rx="4" fill="url(#studioGrad)" opacity="0.9"/>
  <!-- Bottom bar: Tanda Commerce -->
  <rect x="34" y="74" width="52" height="16" rx="4" fill="url(#studioGrad)" opacity="0.8"/>
</svg>
