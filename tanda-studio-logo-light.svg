<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Light variant for dark backgrounds: white with subtle gradient -->
    <linearGradient id="studioLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#e8f4f4"/>
      <stop offset="100%" style="stop-color:#00f2ea"/>
    </linearGradient>
  </defs>
  <!-- Three stacked layers - white/light for visibility on dark nav -->
  <rect x="18" y="30" width="84" height="16" rx="4" fill="url(#studioLight)"/>
  <rect x="26" y="52" width="68" height="16" rx="4" fill="url(#studioLight)"/>
  <rect x="34" y="74" width="52" height="16" rx="4" fill="url(#studioLight)"/>
</svg>
